<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover so the standalone PWA flows under the
         iPhone notch / home indicator instead of leaving black bars. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />

    <title>%WEB_TITLE%</title>
    <meta
      name="description"
      content="шукайпес — every walk has a purpose."
    />

    <!-- PWA manifest + icon. Files in /public are copied verbatim
         into dist by expo-router. -->
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Telegram Mini App SDK. When the page is opened inside Telegram
         (Mini App), `window.Telegram.WebApp.initData` is a signed
         payload our server verifies for auth — no login screen, the
         user is already known. Outside Telegram (regular browser /
         PWA), `window.Telegram` is undefined and we fall back to the
         existing device-id flow. Script is cheap (~10 KB) and loads
         on every page even outside TG, but it's a no-op there. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Preload the brand font alongside the HTML so the browser
         starts fetching before CSS parses @font-face. crossorigin is
         required by the spec for font preloads even on same-origin. -->
    <link
      rel="preload"
      href="/fonts/Annex-Regular/Annex-Regular.woff2?v=3"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- iOS PWA: apple-touch-icon is what shows on the home screen,
         the apple-mobile-web-app meta block makes the launched site
         behave like a standalone app (no browser chrome). -->
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- `black-translucent` lets the page extend under the iOS status
         bar instead of getting an inset reserve. The map renders all
         the way to the top of the screen and acts as the bg for the
         status bar text — design-only, the HUD itself still respects
         the safe-area inset via SafeAreaView so logo + pills don't
         sit under the bar. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="шукайпес" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* Brand font for all UI chrome (HUD, bubbles, modals, tabs).
         WOFF2 first — it's the format iOS Safari prefers and the
         only one where it reliably ignores Content-Type mismatches.
         TTF stays as fallback for ancient browsers. ?v=3 busts any
         stuck CDN / Safari font cache from the earlier broken
         declarations (variable weight range, no format hint).
         font-display: swap so the system stack renders first, then
         the browser swaps once Annex lands. */
      @font-face {
        font-family: 'Annex Regular';
        src: url('/fonts/Annex-Regular/Annex-Regular.woff2?v=3') format('woff2'),
             url('/fonts/Annex-Regular/Annex-Regular.ttf?v=3') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* These styles make the body full-height */
      html,
      body {
        /* Cascade so the app fills the FULL screen height, including the
           bottom home-indicator safe-area strip. On an iOS standalone
           PWA, plain `height: 100%` resolves to the screen height MINUS
           the bottom inset — content then ends ~34px short of the
           physical bottom and the white body::after strip below shows
           through (the world stops bleeding at the bottom even though
           the top, anchored at y=0, looks fine). 100dvh (with 100vh as
           the pre-dvh fallback) includes that strip so the map / scene
           paints all the way down. Older engines fall back to 100%. */
        height: 100%;
        height: 100vh;
        height: 100dvh;
        margin: 0;
        padding: 0;
      }
      /* Paint the iOS home-indicator safe-area strip white BEFORE
         React mounts. Once mounted, the full-bleed world (map / dog
         scene) now extends all the way down through this strip and
         covers it, so the pseudo-element only matters during pre-React
         paint — it stops the strip flashing the body bg for one frame
         on cold load + each PWA wake (a small blink below the floating
         tab pill). z-index:-1 keeps it behind the app content. */
      body::after {
        content: '';
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: env(safe-area-inset-bottom, 0px);
        background: #ffffff;
        z-index: -1;
      }
      body {
        overflow: hidden;
        /* Body bg stays white — that matches the dashboard tab bar
           pill so the home-indicator strip reads as the same surface,
           and it matches the original initial-load flash colour
           (was white before; switching to dark introduced both a
           visible black flash on cold-load AND a black strip below
           the tab bar). With the PWA meta extending the page under
           the OS status bar, the map itself covers the top region
           in steady state, so we don't need a dark fallback there. */
        background: #ffffff;
        /* Brand font applies app-wide so any RN <Text> without an
           explicit fontFamily style still inherits Annex Regular
           instead of dropping back to the browser default serif. */
        font-family: 'Annex Regular', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        /* Match the body cascade so the RN app container also reaches
           the physical bottom edge (see the html/body note above). */
        height: 100%;
        height: 100vh;
        height: 100dvh;
        flex: 1;
      }

      /* Installed PWA (added to the home screen): the standalone webview
         leaves the bottom home-indicator strip uncovered with plain
         height units AND with `position:fixed; inset:0` (its fixed
         viewport excludes that inset) — the world stops bleeding ~34px
         short and the white body::after shows through. The one thing
         that DOES paint through the strip is a height that explicitly
         adds the inset back: calc(100dvh + env(safe-area-inset-bottom)).
         The trade-off is that this extends the layout's bottom edge
         BELOW the visible screen by that inset, so every bottom-anchored
         element compensates with the matching overshoot (see
         hooks/usePwaInsetOvershoot.ts). Scoped to display-mode:
         standalone so a normal browser tab and the ≥900px desktop column
         below are unaffected. */
      @media (display-mode: standalone) {
        html,
        body,
        #root {
          height: calc(100dvh + env(safe-area-inset-bottom, 0px));
        }
      }

      /* Desktop: the product is mobile-first and looks broken stretched
         to a 1920px laptop screen — HUD pills floating in the corner,
         dashboard spanning the whole width, modals docked far off. Cap
         the app to a phone-width column on viewports ≥ 900px and dim
         the wings around it so the desktop preview reads as a mobile
         display. No fake phone bezel; just the natural mobile column.
         position:relative on #root keeps the app's internal absolute-
         positioned modals + overlays anchored to the column, not the
         viewport. */
      @media (min-width: 900px) {
        body {
          background: #15151a;
        }
        #root {
          position: relative;
          max-width: 430px;
          margin: 0 auto;
          box-shadow: 0 0 60px rgba(0, 0, 0, 0.4);
        }
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
