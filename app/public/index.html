<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover so the standalone PWA flows under the
         iPhone notch / home indicator instead of leaving black bars. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />

    <title>%WEB_TITLE%</title>
    <meta
      name="description"
      content="find lost pets in kyiv. real walks, real dogs."
    />

    <!-- PWA manifest + icon. Files in /public are copied verbatim
         into dist by expo-router. -->
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffffff" />

    <!-- iOS PWA: apple-touch-icon is what shows on the home screen,
         the apple-mobile-web-app meta block makes the launched site
         behave like a standalone app (no browser chrome). -->
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="шукайпес" />

    <!-- OpenMoji color web font — every emoji in the interface (HUD
         pills, badges, profile pose icons, chat replies, OLX pet
         names with sparkles, etc.) renders the same way on every
         device instead of hopping between Apple Color Emoji /
         Segoe UI Emoji / Noto. CC BY-SA 4.0; attribution lives in
         the about modal. ~7 MB color font, cached after first load.

         unicode-range scopes the @font-face to emoji blocks so the
         browser doesn't even consult OpenMoji for Latin text. -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/gh/hfg-gmuend/openmoji@15.1.0/font/OpenMoji-color-colr1_svg/OpenMoji-color-colr1_svg.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous"
    />
    <style>
      @font-face {
        font-family: 'OpenMoji';
        src: url('https://cdn.jsdelivr.net/gh/hfg-gmuend/openmoji@15.1.0/font/OpenMoji-color-colr1_svg/OpenMoji-color-colr1_svg.ttf')
          format('truetype');
        font-display: swap;
        unicode-range:
          U+1F000-1FAFF, U+2600-27BF, U+2300-23FF, U+2B00-2BFF,
          U+1F100-1F1FF, U+1F200-1F2FF, U+200D, U+FE0F;
      }
      html,
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', Roboto, 'OpenMoji', sans-serif;
      }
    </style>

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
