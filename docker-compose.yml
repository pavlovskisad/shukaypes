services:
  db:
    image: postgis/postgis:16-3.4
    container_name: shukajpes_db
    environment:
      POSTGRES_USER: shukajpes
      POSTGRES_PASSWORD: shukajpes
      POSTGRES_DB: shukajpes_dev
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shukajpes -d shukajpes_dev']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shukajpes_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
