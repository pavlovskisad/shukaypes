# Fly.io app config for the шукайпес API.
# First-time deploy:
#   cd server && fly launch --no-deploy --copy-config --name shukajpes-api
#   fly secrets set DATABASE_URL=... REDIS_URL=... ANTHROPIC_API_KEY=... GOOGLE_MAPS_API_KEY=...
#   fly deploy

app = "shukajpes-api"
primary_region = "waw"  # Warsaw — closest low-latency PoP for Kyiv users.

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1  # Keep one warm so cron decay ticks actually run.
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
